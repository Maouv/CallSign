<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>Callsign</title>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <!-- FIX 0: cockpit frame — all CSS static, z-1 -->
    <div id="canopy-rim"></div>
    <div id="canopy-structure"></div>
    <div id="canopy-glare"></div>
    <div id="nose"></div>

    <!-- HUD SVG — z-2, clipped -->
    <svg id="hud-svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
      <defs>
        <!-- FIX 1: clip mask — 60% w, 70% h, center -->
        <clipPath id="hud-clip">
          <rect x="160" y="90" width="480" height="420"/>
        </clipPath>
      </defs>

      <!-- FIX 2: combiner frame border -->
      <rect x="160" y="90" width="480" height="420" fill="none" stroke="#39FF14" stroke-width="1.5" opacity="0.6"/>

      <!-- clipped dynamic elements -->
      <g id="pitch-ladder" clip-path="url(#hud-clip)"></g>
      <g id="heading-tape" clip-path="url(#hud-clip)"></g>
      <g id="speed-ladder" clip-path="url(#hud-clip)"></g>
      <g id="alt-ladder" clip-path="url(#hud-clip)"></g>
      <g id="fpm" clip-path="url(#hud-clip)">
        <circle cx="0" cy="0" r="10" fill="none" stroke="#39FF14" stroke-width="2"/>
        <line x1="-14" y1="0" x2="-6" y2="0" stroke="#39FF14" stroke-width="2"/>
        <line x1="6" y1="0" x2="14" y2="0" stroke="#39FF14" stroke-width="2"/>
        <line x1="0" y1="-10" x2="0" y2="-4" stroke="#39FF14" stroke-width="2"/>
      </g>

      <!-- unclipped static text -->
      <text id="callsign" x="20" y="570" fill="#39FF14" font-size="14" font-family="monospace">VIPER</text>
      <text id="mode" x="780" y="570" fill="#39FF14" font-size="14" font-family="monospace" text-anchor="end">NAV</text>
      <text id="g-text" x="400" y="530" fill="#39FF14" font-size="13" font-family="monospace" text-anchor="middle">G 1.0</text>
    </svg>

    <div id="g-overlay"></div>
    <div id="rotate-overlay">Rotate device to landscape</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
