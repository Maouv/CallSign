<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>Callsign</title>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="cockpit-frame">
      <svg id="hud-svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
        <g id="pitch-ladder"></g>
        <g id="heading-tape"></g>
        <g id="speed-ladder"></g>
        <g id="alt-ladder"></g>
        <g id="fpm">
          <circle cx="0" cy="0" r="10" fill="none" stroke="#39FF14" stroke-width="2"/>
          <line x1="-14" y1="0" x2="-6" y2="0" stroke="#39FF14" stroke-width="2"/>
          <line x1="6" y1="0" x2="14" y2="0" stroke="#39FF14" stroke-width="2"/>
          <line x1="0" y1="-10" x2="0" y2="-4" stroke="#39FF14" stroke-width="2"/>
        </g>
        <text id="callsign" x="20" y="570" fill="#39FF14" font-size="14" font-family="monospace">VIPER</text>
        <text id="mode" x="780" y="570" fill="#39FF14" font-size="14" font-family="monospace" text-anchor="end">NAV</text>
        <text id="g-text" x="400" y="530" fill="#39FF14" font-size="13" font-family="monospace" text-anchor="middle">G 1.0</text>
      </svg>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
